<html>
    <head>
        <title>CardRetro</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: black;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            canvas {
                /* scale to fit the viewport while keeping 1280x720 aspect ratio */
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas"></canvas>
        <script type="module">
            import cardretro from "./cardretro.mjs";
            cardretro({ canvas: document.getElementById("canvas") });
        </script>
    </body>
</html>
