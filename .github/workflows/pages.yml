name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Configure (emcmake)
        run: emcmake cmake -B wbuild -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build wbuild --parallel

      - name: Copy artifacts into web/
        run: |
          cp wbuild/cardflow.mjs  web/
          cp wbuild/cardflow.data web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
